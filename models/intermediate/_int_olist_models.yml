version: 2

models:
  - name: INT_PAYMENTS_PIVOTED_TO_ORDERS
    description: >
      Payment aggregation per order to get a single record per order_id, with total payment value and number of payments.
    columns:
      - name: order_iddbt
        description: Order identifier (model grain)
        tests:
          - unique
          - not_null
      - name: total_payment_value
        description: Total payment amoun for the order (sum of payment_value)
        tests:
          - not_null
      - name: payments_count
        description: Number of payments for the order

  - name: INT_ORDERS_ENRICHED
    description : >
      Enriched orders with customer information and aggregated payments.
      Grain: One row per order
    columns:
      - name: order_id
        description: Order identifier (model grain)
        tests:
          - unique
          - not_null
      - name: customer_id
        description: Olist customer identifier linked to the order
        tests:
          - not_null
      - name: customer_unique_id
        description: Unique client identifier (groups multiple customer_id)
      - name: order_status
        Description: Order status
        tests:
          - accepted_values:
              values: ['unavailable','invoiced','canceled','delivered','shipped','processing','created','approved']
      - name: order_purchase_ts
        description: Order purchase timestamp
        test:
          - not_null
      - name: payments_count
        description: Payments count for the order
      - name: delivery_delay_days
        description: > 
          Difference in days between real delivery date and estimated delivery date. (negative if delivered before estimated date)
  
  - name: INT_ORDER_ITEMS_ENRICHED
    description: >
      Enriched order lines with product information.
      Grain : 1 line per order_id and order_item_id
    columns:
      - name: order_id
        description: Order identifier
        tests:
          - not_null
      - name: order_item_id
        description: Order line index inside the order
        tests:
          - not_null
      - name: product_id
        description: Sold product identifier
        tests:
          - not_null
      - name: product_category_name
        description: 'Product category (Olist original name)'
      - name: price
        description: Order line price
        tests:
          - not_null
      - name: freight_value
        description: Shipping fees for the order line
  
  - name: INT_CUSTOMER_ORDERS_AGG
    description: >
      Aggregation per unique customer (customer_unique_id) on order history : number of orders, total revenue, first and last order.
      Grain : One row per customer_unique_id
    columns:
      - name: customer_unique_id
        description: Unique customer identifier at Olist level
        tests:
          - not_null
          - unique
      - name: first_order_ts
        description: Customer first order timestamp
      - name: last_order_ts
        description: Customer last order timestamp
      - name: orders_count
        description: Customer total order number
        tests:
          - not_null
      - name: total_revenue
        description: Total revenue generated by the customer
        tests:
          - not_null
      - name: avg_order_value
        description: Average customer bucket

  - name: INT_LEADS_WITH_DEALS
    description: >
      Marketing model that joins leads (MQL) to deals, with conversion indicator.
      Grain : One row per MQL_ID
    columns:
      - name: mql_id
        description: Marketing qualified lead identifier
        tests:
          - not_null
          - unique
      - name: first_contact_date
        description: Date of lead first contact
      - name: origin
        description: Mead origin or channel
      - name: won_date
        description: Conversion date (date of deal won)
      - name: is_won
        description: Binary flag indicating if the lead was converted into a deal
      - name: seller_id
        description: Seller idtenfier in case the lead was converted into a deal

  - name: INT_MARKETING_FUNNEL_JOINED
    description: >
      Sums up markeing funnel by seller by aggregating leads (MQL) and deals at seller_id level, with conversion indicators
    columns:
      - name: seller_id
        description: Seller identifier
        tests:
          - not_null
          - unique
      - name: mql_count
        description: Total number of MQLs for the seller
        tests:
          - not_null
      - name: won_mql_count
        description: Number of MQLs converted into won deals
      - name: mql_to_deal_conv_rate
        description: Conversion rate from MQL to won deal
      - name: first_mql_date
        description: Date of first MQL for the seller
      - name: last_mql_date
        description: Date of last MQL for the seller
      - name: first_won_date
        description: Date of first won deal for the seller
      - name: last_won_date
        description: Date of last won deal for the seller